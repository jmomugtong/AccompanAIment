name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ── Lint ───────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install backend lint dependencies
        run: pip install black isort flake8 mypy pydantic pydantic-settings

      - name: Run black (check)
        working-directory: backend
        run: black --check --diff src/ tests/

      - name: Run isort (check)
        working-directory: backend
        run: isort --check-only --diff src/ tests/

      - name: Run flake8
        working-directory: backend
        run: flake8 src/ tests/ --max-line-length 88 --extend-ignore E203,W503

      - name: Run mypy
        working-directory: backend
        run: mypy src/ --ignore-missing-imports

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run Prettier (check)
        working-directory: frontend
        run: npm run format:check

  # ── Backend Tests ──────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install aiosqlite

      - name: Run pytest with coverage
        working-directory: backend
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          OLLAMA_BASE_URL: "http://localhost:11434"
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── Frontend Tests ─────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Run tests with coverage
        working-directory: frontend
        run: |
          npx vitest run \
            --coverage \
            --coverage.reporter=text \
            --coverage.reporter=json \
            --coverage.thresholds.lines=70 \
            --coverage.thresholds.functions=70 \
            --coverage.thresholds.branches=70 \
            --coverage.thresholds.statements=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ── Integration Tests ──────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: accompaniment
          POSTGRES_PASSWORD: accompaniment
          POSTGRES_DB: accompaniment_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U accompaniment"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install aiosqlite

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: "postgresql+asyncpg://accompaniment:accompaniment@localhost:5432/accompaniment_test"
          DATABASE_URL_SYNC: "postgresql://accompaniment:accompaniment@localhost:5432/accompaniment_test"
          REDIS_URL: "redis://localhost:6379/0"
          CELERY_BROKER_URL: "redis://localhost:6379/0"
          CELERY_RESULT_BACKEND: "redis://localhost:6379/1"
          OLLAMA_BASE_URL: "http://localhost:11434"
        run: |
          pytest tests/integration/ -v --tb=short

  # ── Docker Build ───────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: accompaniment-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: false
          tags: accompaniment-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security Scan ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety

      - name: Run safety check on backend dependencies
        working-directory: backend
        run: safety check -r requirements.txt --output text || true
        continue-on-error: true

      - name: Run Trivy filesystem scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Run Trivy filesystem scan (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./frontend
          severity: CRITICAL,HIGH
          exit-code: 0
